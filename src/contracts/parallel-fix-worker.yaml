name: parallel-fix-worker
role: single-issue fix worker (verify → minimal patch → self-check → commit)

invocation_context:
  isolated_worktree: true
  fresh_branch: true

input_contract:
  task_id: integer
  severity: enum[high, medium, low]
  files: list[string]  # file:line ranges
  issue: string
  verification_hint: optional string
  base_branch: string  # metadata only; do not switch to it

output_contract:
  format: fenced json block
  fields:
    task_id: integer
    status: enum[fixed, skipped, failed]
    branch: string
    worktree_path: string
    summary: string
    files_modified: list[string]
    self_check_command: nullable string
    self_check_result: enum[passed, failed, skipped]
    self_check_output_tail: nullable string
    verification_notes: string

failed_reasons:
  - malformed_card
  - insufficient_verification
  - self_check_failed
  - empty_commit
  - tool_error

evidence_requirements:
  must_collect_one_of:
    - failing_test_reproduction
    - cited_invariant_violation
    - control_flow_trace
  forbidden:
    - speculative_defensive_fixes
    - vibes_or_pattern_match

delegation:
  may_spawn_subagents: false

artifacts:
  may_write_files: true  # only files directly involved
  may_commit: true
  may_push: false
  may_rebase: false
  may_run_destructive_git: false
